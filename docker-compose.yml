services:
  feishu-demo:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: feishu-demo
    restart: unless-stopped
    ports:
      - "3030:3030"
    environment:
      PORT: "3030"
      HOST: "0.0.0.0"
      CHROME_PATH: "/usr/bin/chromium"
    volumes:
      - ./data:/app/data
    shm_size: "1gb"
    healthcheck:
      test:
        [
          "CMD",
          "node",
          "-e",
          "fetch('http://127.0.0.1:3030/api/state').then((res) => process.exit(res.ok ? 0 : 1)).catch(() => process.exit(1))",
        ]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 20s
