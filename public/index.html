<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Bot Auth Console</title>
    <link rel="stylesheet" href="/styles.css" />
  </head>
  <body>
    <main class="shell">
      <section class="hero">
        <div>
          <p class="eyebrow">Bot Auth Console</p>
          <h1>飞书 / QQ 机器人批量管理</h1>
          <p class="hero-copy">
            登录态会保存到当前项目目录下的 <code>data/auth</code>。未过期时可直接复用，不需要每次重新扫码。
          </p>
        </div>
        <div class="hero-actions">
          <button id="open-inventory-button" class="ghost-button" type="button">全部机器人</button>
          <button id="refresh-button" class="ghost-button" type="button">刷新状态</button>
        </div>
      </section>

      <section class="platform-grid">
        <article class="panel" data-platform="feishu">
          <header class="panel-header">
            <div>
              <p class="panel-kicker">Feishu</p>
              <h2>飞书授权与机器人</h2>
            </div>
            <div class="status-wrap">
              <span class="status-badge" data-role="auth-status">未授权</span>
              <span class="status-meta" data-role="auth-meta"></span>
            </div>
          </header>

          <div class="toolbar">
            <button class="primary-button" data-action="auth">扫码授权</button>
            <button class="ghost-button" data-action="clear-auth">清除授权</button>
          </div>

          <div class="auth-box">
            <div class="qr-frame" data-role="qr-frame">
              <div class="qr-placeholder">等待扫码任务</div>
            </div>
            <div class="auth-hint" data-role="auth-message">尚未启动授权流程。</div>
            <div class="qr-meta" data-role="qr-meta"></div>
          </div>

          <label class="field">
            <span>机器人名称</span>
            <textarea data-role="names" rows="7" placeholder="每行一个机器人名称"></textarea>
          </label>

          <label class="field">
            <span>描述</span>
            <input data-role="description" placeholder="可选，批量创建时统一使用" />
          </label>

          <div class="toolbar">
            <button class="primary-button" data-action="create">批量创建</button>
            <button class="danger-button" data-action="delete">批量删除</button>
          </div>

          <div class="task-box">
            <div class="task-head">
              <span>任务日志</span>
              <span class="task-summary" data-role="task-summary">空闲</span>
            </div>
            <pre class="task-log" data-role="task-log">暂无任务。</pre>
          </div>

          <div class="inventory-box">
            <div class="task-head">
              <span>本地清单</span>
              <span class="task-summary" data-role="inventory-count">0 条</span>
            </div>
            <div class="inventory-list" data-role="inventory"></div>
          </div>
        </article>

        <article class="panel" data-platform="qq">
          <header class="panel-header">
            <div>
              <p class="panel-kicker">QQ</p>
              <h2>QQ 授权与机器人</h2>
            </div>
            <div class="status-wrap">
              <span class="status-badge" data-role="auth-status">未授权</span>
              <span class="status-meta" data-role="auth-meta"></span>
            </div>
          </header>

          <div class="toolbar">
            <button class="primary-button" data-action="auth">扫码授权</button>
            <button class="ghost-button" data-action="clear-auth">清除授权</button>
          </div>

          <div class="auth-box">
            <div class="qr-frame" data-role="qr-frame">
              <div class="qr-placeholder">等待扫码任务</div>
            </div>
            <div class="auth-hint" data-role="auth-message">尚未启动授权流程。</div>
            <div class="qr-meta" data-role="qr-meta"></div>
          </div>

          <label class="field">
            <span>机器人名称</span>
            <textarea data-role="names" rows="7" placeholder="每行一个机器人名称"></textarea>
          </label>

          <label class="field">
            <span>描述</span>
            <input data-role="description" placeholder="可选，批量创建时统一使用" />
          </label>

          <div class="toolbar">
            <button class="primary-button" data-action="create">批量创建</button>
            <button class="danger-button" data-action="delete">批量删除</button>
          </div>

          <div class="task-box">
            <div class="task-head">
              <span>任务日志</span>
              <span class="task-summary" data-role="task-summary">空闲</span>
            </div>
            <pre class="task-log" data-role="task-log">暂无任务。</pre>
          </div>

          <div class="inventory-box">
            <div class="task-head">
              <span>本地清单</span>
              <span class="task-summary" data-role="inventory-count">0 条</span>
            </div>
            <div class="inventory-list" data-role="inventory"></div>
          </div>
        </article>
      </section>
    </main>

    <dialog id="inventory-dialog" class="inventory-dialog">
      <div class="inventory-dialog-shell">
        <header class="inventory-dialog-header">
          <div>
            <p class="panel-kicker">Inventory Export</p>
            <h2>全部机器人</h2>
            <p class="inventory-dialog-copy">飞书使用当前扫码授权账号的远端应用列表，QQ 使用本地清单，并支持 CSV / Excel 导出。</p>
          </div>
          <div class="inventory-dialog-actions">
            <button id="export-csv-button" class="ghost-button" type="button">导出 CSV</button>
            <button id="export-excel-button" class="ghost-button" type="button">导出 Excel</button>
            <button id="close-inventory-button" class="ghost-button" type="button">关闭</button>
          </div>
        </header>

        <div class="inventory-dialog-summary">
          <div class="inventory-filter-bar">
            <label class="field inventory-filter-field">
              <span>名称过滤</span>
              <input id="inventory-filter-name" placeholder="按机器人名称筛选" />
            </label>
            <label class="field inventory-filter-field">
              <span>开始时间</span>
              <input id="inventory-filter-from" type="date" />
            </label>
            <label class="field inventory-filter-field">
              <span>结束时间</span>
              <input id="inventory-filter-to" type="date" />
            </label>
            <div class="inventory-filter-actions">
              <button id="apply-inventory-filter-button" class="ghost-button" type="button">应用过滤</button>
              <span class="task-summary" id="inventory-dialog-total">0 条</span>
            </div>
          </div>
        </div>

        <div id="inventory-dialog-content" class="inventory-modal-grid"></div>
      </div>
    </dialog>

    <script type="module" src="/app.js"></script>
  </body>
</html>
